name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run eslint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Run cargo check
        run: cargo check
        working-directory: src-tauri
